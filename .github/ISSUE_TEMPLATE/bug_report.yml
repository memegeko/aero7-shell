name: Bug report
description: Report an Aero7-shell install, UI, packaging, or VM issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the failure and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command used
      description: Paste the exact command you ran.
      render: bash
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Relevant log output
      description: Paste the final error and the log path. Avoid passwords or tokens.
      render: text
  - type: input
    id: system
    attributes:
      label: System
      placeholder: Arch Linux version, VM/hardware, Plasma version if known
  - type: textarea
    id: diagnostics
    attributes:
      label: UI diagnostics
      description: Output of ./install.sh --ui-diagnostics, if the issue is UI-related.
      render: text
